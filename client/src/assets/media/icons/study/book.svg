<svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Book Cover (Red Hard Cover) -->
  <path d="M25 25 L195 25 L200 155 L20 155 Z" fill="#e74c3c" stroke="#2c3e50" stroke-width="18" stroke-linejoin="round"/>
  
  <!-- Left Page -->
  <path d="M35 35 Q75 25 110 38 L110 145 Q75 155 35 145 Z" 
        fill="#fdfdfd" stroke="#34495e" stroke-width="8"/>
  
  <!-- Right Page -->
  <path d="M110 38 Q145 25 185 35 L185 145 Q145 155 110 145 Z" 
        fill="#f8f9fa" stroke="#34495e" stroke-width="8"/>
  
  <!-- Spine / Binding -->
  <rect x="105" y="28" width="12" height="124" fill="#c0392b" rx="4"/>
  
  <!-- Page Lines - Left -->
  <path d="M50 55 L95 55" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M50 68 L95 68" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M50 81 L95 81" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M50 94 L95 94" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M50 107 L95 107" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  
  <!-- Page Lines - Right -->
  <path d="M125 55 L170 55" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M125 68 L170 68" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  <path d="M125 81 L170 81" stroke="#2c3e50" stroke-width="3.5" opacity="0.85"/>
  
  <!-- Page Shadow / Fold Effect -->
  <path d="M110 38 Q130 45 110 145" fill="none" stroke="#2c3e50" stroke-width="6" opacity="0.12"/>
  
  <!-- Subtle Shadow on Cover -->
  <path d="M25 25 L195 25 L200 155" fill="none" stroke="#000000" stroke-width="12" opacity="0.08"/>
</svg>